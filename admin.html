<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailTrack - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-box h3 {
            color: var(--primary-color);
            font-size: 30px;
            margin-top: 10px;
        }
        .coach-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
        }
        .seat {
            position: relative;
        }
        .seat:hover .tooltip {
            display: block;
        }
        .tooltip {
            display: none;
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">RailTrack Admin</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="admin.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </header>
    
    <div class="container mt-5">
        <h2>System Dashboard</h2>
        <div class="stats-grid" id="statsGrid">
            <!-- Populated via JS -->
        </div>

        <h2 class="mt-5">Coach Layout</h2>
        <div class="form-group mt-3" style="max-width: 300px;">
            <label>Select Train</label>
            <select id="trainSelect" onchange="renderCoachLayout()">
                <option value="">--Select Train--</option>
            </select>
        </div>
        
        <div id="layoutArea" class="mt-3" style="display:none;">
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Date</label>
                    <input type="date" id="adminDate" onchange="drawSeats()" style="width: 100%; padding: 8px;">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>From</label>
                    <select id="adminSource" onchange="drawSeats()"></select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>To</label>
                    <select id="adminDest" onchange="drawSeats()"></select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Select Coach</label>
                    <select id="coachSelect" onchange="drawSeats()">
                    </select>
                </div>
            </div>
            
            <div class="card mt-3">
                <h4>Seat Map for Selected Leg (Legend: <span style="color:green">Available</span>, <span style="color:red">Booked</span>, <span style="color:#f7931e">Partially Booked</span>)</h4>
                <div id="seatMap" class="coach-container mt-3">
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.initSystemData) window.initSystemData();
            loadDashboardStats();
            loadTrainsDropdown();
        });

        function loadDashboardStats() {
            const trains = Storage.getTrains();
            const passengers = Storage.getPassengers();
            
            let totalTrains = trains.length;
            let totalBookings = passengers.filter(p => p.status === "Confirmed" || p.status === "RAC" || p.status === "WL").length;
            let cancelled = passengers.filter(p => p.status === "Cancelled").length;
            let revenue = passengers.filter(p => p.status !== "Cancelled").reduce((sum, p) => sum + parseInt(p.fare || 0), 0);
            
            let totalSeats = 0;
            trains.forEach(t => {
                if (t.coaches && Array.isArray(t.coaches)) {
                    t.coaches.forEach(c => {
                        if (c.seats) totalSeats += c.seats.length;
                    });
                }
            });

            document.getElementById("statsGrid").innerHTML = `
                <div class="stat-box">
                    <p>Total Trains</p>
                    <h3>${totalTrains}</h3>
                </div>
                <div class="stat-box">
                    <p>Total Bookings</p>
                    <h3>${totalBookings}</h3>
                </div>
                <div class="stat-box">
                    <p>Revenue</p>
                    <h3>₹${revenue}</h3>
                </div>
                <div class="stat-box">
                    <p>Total Capacity (Seats)</p>
                    <h3>${totalSeats}</h3>
                </div>
                <div class="stat-box">
                    <p>Cancelled Tickets</p>
                    <h3>${cancelled}</h3>
                </div>
            `;
        }

        function loadTrainsDropdown() {
            const trains = Storage.getTrains();
            const select = document.getElementById("trainSelect");
            trains.forEach(t => {
                let opt = document.createElement("option");
                opt.value = t.number;
                opt.textContent = `${t.name} (${t.number})`;
                select.appendChild(opt);
            });
        }

        let currentTrainData = null;

        function renderCoachLayout() {
            const trainNo = document.getElementById("trainSelect").value;
            if(!trainNo) {
                document.getElementById("layoutArea").style.display = "none";
                return;
            }

            const trains = Storage.getTrains();
            currentTrainData = trains.find(t => t.number === trainNo);
            
            const coachSelect = document.getElementById("coachSelect");
            coachSelect.innerHTML = "";
            currentTrainData.coaches.forEach(c => {
                let opt = document.createElement("option");
                opt.value = c.name;
                opt.textContent = c.name;
                coachSelect.appendChild(opt);
            });

            const adminSource = document.getElementById("adminSource");
            const adminDest = document.getElementById("adminDest");
            adminSource.innerHTML = "";
            adminDest.innerHTML = "";
            
            currentTrainData.route.forEach(r => {
                adminSource.innerHTML += `<option value="${r}">${r}</option>`;
                adminDest.innerHTML += `<option value="${r}">${r}</option>`;
            });
            adminDest.selectedIndex = currentTrainData.route.length - 1;
            
            const adminDate = document.getElementById("adminDate");
            if(!adminDate.value) adminDate.value = new Date().toISOString().split("T")[0];

            document.getElementById("layoutArea").style.display = "block";
            drawSeats();
        }

        function drawSeats() {
            const coachName = document.getElementById("coachSelect").value;
            const src = document.getElementById("adminSource").value;
            const dest = document.getElementById("adminDest").value;
            
            const srcIdx = currentTrainData.route.indexOf(src);
            const destIdx = currentTrainData.route.indexOf(dest);
            
            const seatMap = document.getElementById("seatMap");
            
            const adminDate = document.getElementById("adminDate").value;
            
            if(srcIdx >= destIdx) {
                seatMap.innerHTML = "<p style='color:red'>Invalid route selected (From must be before To).</p>";
                return;
            }
            
            const coach = currentTrainData.coaches.find(c => c.name === coachName);
            seatMap.innerHTML = "";
            
            const passengers = Storage.getPassengers().filter(p => p.trainNo === currentTrainData.number && p.status === "Confirmed" && p.coach === coachName && p.date === adminDate);

            coach.seats.forEach(s => {
                const div = document.createElement("div");
                
                const occupants = passengers.filter(p => p.seat === s.seatNo);
                
                let isAvailableForRequestedLeg = true;
                let hasAnyOccupant = occupants.length > 0;
                let tooltipInfo = [];
                
                for(let occ of occupants) {
                    const occSrc = currentTrainData.route.indexOf(occ.source);
                    const occDest = currentTrainData.route.indexOf(occ.dest);
                    
                    tooltipInfo.push(`${occ.name} (${occ.source}->${occ.dest})`);
                    
                    if(srcIdx < occDest && destIdx > occSrc) {
                        isAvailableForRequestedLeg = false;
                    }
                }
                
                if (isAvailableForRequestedLeg && !hasAnyOccupant) {
                    div.className = "seat Available"; 
                } else if (isAvailableForRequestedLeg && hasAnyOccupant) {
                    div.className = "seat RAC"; 
                } else {
                    div.className = "seat Confirmed"; 
                }
                
                div.textContent = s.seatNo;
                let info = tooltipInfo.length > 0 ? tooltipInfo.join("<br>") : "Fully Available";
                
                div.innerHTML += `<div class="tooltip">Seat: ${s.seatNo} (${s.type})<br>${info}</div>`;
                seatMap.appendChild(div);
            });
        }
    </script>
</body>
</html>
