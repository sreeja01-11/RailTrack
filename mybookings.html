<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailTrack - My Bookings</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-card {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .animating {
            animation: highlight 2s ease-in-out;
        }
        @keyframes highlight {
            0% { background-color: #ffeb3b; }
            100% { background-color: white; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">RailTrack</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pnr.html">PNR Status</a>
            <a href="mybookings.html">My Bookings</a>
            <a href="admin.html">Admin</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </header>
    
    <div class="container mt-5">
        <h2>My Bookings</h2>
        
        <div id="bookingsList" class="mt-3">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Modal for animation demo -->
    <div id="cancelModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="card" style="width: 500px; text-align:center;">
            <h3>Cancellation Processing</h3>
            <div id="animationSteps" style="text-align:left; margin-top:20px; font-family: monospace; font-size:16px;">
            </div>
            <button class="btn btn-primary mt-3" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cancel.js"></script>
</body>
</html>
