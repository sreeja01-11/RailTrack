<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailTrack - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">RailTrack</div>
        <div class="nav-links" id="navLinks">
            <span id="navItems">
                <a href="index.html">Home</a>
                <a href="pnr.html">PNR Status</a>
                <a href="mybookings.html">My Bookings</a>
                <a href="admin.html">Admin</a>
            </span>
            <a href="#" id="authLink" onclick="logout()">Logout</a>
        </div>
    </header>
    
    <div class="container mt-5">
        <div class="card">
            <h2>Book Your Ticket</h2>
            <form id="searchForm" class="mt-3">
                <div style="display: flex; gap: 20px;">
                    <div class="form-group autocomplete" style="flex: 1; position: relative;">
                        <label>From</label>
                        <input type="text" id="source" placeholder="Type station name..." autocomplete="off" class="form-control" required style="width: 100%; padding: 8px;">
                        <input type="hidden" id="sourceCode" required>
                        <div id="sourceDropdown" class="autocomplete-items"></div>
                    </div>
                    <div class="form-group autocomplete" style="flex: 1; position: relative;">
                        <label>To</label>
                        <input type="text" id="dest" placeholder="Type station name..." autocomplete="off" class="form-control" required style="width: 100%; padding: 8px;">
                        <input type="hidden" id="destCode" required>
                        <div id="destDropdown" class="autocomplete-items"></div>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Search Trains</button>
            </form>
        </div>
        
        <div id="searchResults" class="mt-5" style="display: none;">
            <h3>Available Trains</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Train No</th>
                        <th>Train Name</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Duration</th>
                        <th>Fare</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="trainList">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>

        <div id="recentBookingsSection" class="mt-5" style="display: none;">
            <h3>Your Recent Bookings</h3>
            <div id="homeBookingsList" class="mt-3">
                <!-- Populated via JS -->
            </div>
            <a href="mybookings.html" class="btn btn-primary mt-3" style="display:inline-block;">View All Bookings</a>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
